<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>
	<nav th:fragment="nav(active)" class="navbar navbar-expand-lg bg-white border-bottom sticky-top">
		<div class="container">
			<a class="navbar-brand fw-semibold" th:href="@{/}">Ecomerce</a>
			<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav"
				aria-controls="nav" aria-expanded="false" aria-label="Toggle navigation">
				<span class="navbar-toggler-icon"></span>
			</button>

			<div class="collapse navbar-collapse" id="nav">
				<ul class="navbar-nav ms-auto gap-lg-2">
					<li class="nav-item">
						<a class="nav-link" th:classappend="${active}=='home' ? ' active fw-semibold' : ''" th:href="@{/}">Home</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:classappend="${active}=='men' ? ' active fw-semibold' : ''" th:href="@{/men}">Men</a>
					</li>
					<li class="nav-item">
						<a class="nav-link" th:classappend="${active}=='women' ? ' active fw-semibold' : ''" th:href="@{/women}">Women</a>
					</li>
				</ul>
			</div>
		</div>
	</nav>

	<footer th:fragment="footer" class="border-top mt-5 py-4 bg-white">
		<div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-2">
			<div class="text-muted small">© <span th:text="${T(java.time.Year).now()}">2026</span> Ecomerce</div>
			<div class="text-muted small">Demo store • Spring Boot + MySQL</div>
		</div>
	</footer>
</body>
</html>
