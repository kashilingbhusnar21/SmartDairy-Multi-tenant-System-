<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${title} + ' • Ecomerce'">Category • Ecomerce</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">
	<div th:replace="~{fragments :: nav(${title.contains('Men')} ? 'men' : 'women')}"></div>

	<main class="container my-4 my-lg-5">
		<div class="d-flex flex-column flex-md-row align-items-start align-items-md-end justify-content-between gap-3 mb-3">
			<div>
				<h1 class="h3 fw-bold mb-1" th:text="${title}">Collection</h1>
				<div class="text-muted" th:text="${subtitle}">Subtitle</div>
			</div>
			<div class="text-muted small" th:text="${products.size()} + ' items'">0 items</div>
		</div>

		<div class="row g-3 g-md-4">
			<div class="col-6 col-lg-3" th:each="p : ${products}">
				<div class="card product-card border-0 shadow-sm h-100 rounded-4 overflow-hidden">
					<a th:href="@{/product/{id}(id=${p.id})}" class="text-decoration-none">
						<img class="product-img w-100" th:src="${p.imageUrl}" alt="">
					</a>
					<div class="card-body">
						<div class="d-flex align-items-center justify-content-between mb-1">
							<span class="badge text-bg-light border" th:text="${p.category}">MEN</span>
							<span class="price" th:text="${'$' + #numbers.formatDecimal(p.price,1,2)}">$0.00</span>
						</div>
						<a th:href="@{/product/{id}(id=${p.id})}" class="stretched-link text-decoration-none text-dark">
							<div class="fw-semibold" th:text="${p.name}">Product name</div>
						</a>
						<div class="text-muted small mt-1 text-truncate" th:text="${p.description}">Description</div>
					</div>
				</div>
			</div>
		</div>

		<div class="alert alert-light border mt-4" th:if="${products.isEmpty()}">
			No products found.
		</div>
	</main>

	<div th:replace="~{fragments :: footer}"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
