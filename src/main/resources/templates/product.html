<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title th:text="${product.name} + ' • Ecomerce'">Product • Ecomerce</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
	<link th:href="@{/styles.css}" rel="stylesheet">
</head>
<body class="bg-light">
	<div th:replace="~{fragments :: nav(${product.category.name().toLowerCase()})}"></div>

	<main class="container my-4 my-lg-5">
		<nav aria-label="breadcrumb" class="mb-3">
			<ol class="breadcrumb small mb-0">
				<li class="breadcrumb-item"><a th:href="@{/}" class="text-decoration-none">Home</a></li>
				<li class="breadcrumb-item">
					<a th:href="${product.category.name() == 'MEN'} ? @{/men} : @{/women}" class="text-decoration-none"
						th:text="${product.category.name() == 'MEN'} ? 'Men' : 'Women'">Category</a>
				</li>
				<li class="breadcrumb-item active" aria-current="page" th:text="${product.name}">Product</li>
			</ol>
		</nav>

		<div class="row g-4">
			<div class="col-lg-6">
				<div class="rounded-4 overflow-hidden shadow-sm bg-white">
					<img th:src="${product.imageUrl}" class="w-100" style="aspect-ratio: 4 / 5; object-fit: cover;" alt="">
				</div>
			</div>

			<div class="col-lg-6">
				<div class="bg-white rounded-4 shadow-sm p-4 p-lg-5">
					<div class="d-flex align-items-center justify-content-between">
						<span class="badge text-bg-light border" th:text="${product.category}">MEN</span>
						<span class="text-muted small" th:text="${product.stock} > 0 ? 'In stock' : 'Out of stock'">In stock</span>
					</div>
					<h1 class="h3 fw-bold mt-2 mb-2" th:text="${product.name}">Product name</h1>
					<div class="h4 price mb-3" th:text="${'$' + #numbers.formatDecimal(product.price,1,2)}">$0.00</div>

					<p class="text-muted" th:text="${product.description}">Description</p>

					<div class="d-flex flex-column flex-sm-row gap-2 mt-4">
						<button class="btn btn-primary btn-lg" type="button" th:disabled="${product.stock} <= 0">
							Add to cart
						</button>
						<a class="btn btn-outline-secondary btn-lg"
							th:href="${product.category.name() == 'MEN'} ? @{/men} : @{/women}">
							Back to collection
						</a>
					</div>
					<div class="text-muted small mt-3">This is a demo button (no checkout flow yet).</div>
				</div>
			</div>
		</div>
	</main>

	<div th:replace="~{fragments :: footer}"></div>

	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
